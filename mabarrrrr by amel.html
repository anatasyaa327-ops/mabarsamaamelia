<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mabar Yuk!</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#ff9ecb,#c8b6ff,#9bf6ff);
    overflow:hidden;
}

.container{
    background:rgba(255,255,255,.25);
    backdrop-filter:blur(12px);
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    width:90%;
    max-width:500px;
}

h1{
    color:white;
    margin-bottom:20px;
}

p{
    color:white;
    margin-bottom:30px;
    font-size:20px;
}

button{
    border:none;
    padding:15px 35px;
    border-radius:50px;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
    transition:.2s;
}

#mulai,#yes{
    background:#4CAF50;
    color:white;
}

#mulai:hover,#yes:hover{
    transform:scale(1.05);
}

#buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
}

#no{
    background:#f44336;
    color:white;
}
</style>

</head>
<body>

<div class="container">

<h1 id="judul">🎮 Haiii!</h1>

<p id="teks">
Aku ada pertanyaan penting buat kamu...
</p>

<button id="mulai">Klik di sini </button>

</div>

<script>

const judul=document.getElementById("judul");
const teks=document.getElementById("teks");
const mulai=document.getElementById("mulai");

mulai.onclick=function(){

judul.innerHTML="🎮 Mau mabar sama aku?";
teks.innerHTML="🥺 Jangan nolak yaa...";

mulai.outerHTML=`
<div id="buttons">
<button id="yes">AYOOO </button>
<button id="no">GAK MAU 😒</button>
</div>
`;

const yes=document.getElementById("yes");
const no=document.getElementById("no");

let besar=18;

const kata=[
"Yakin nih? 🤨",
"Kasian aku 😭",
"Sekali ajaa 🥺",
"Ayoo dong 😆",
"Jangan ditekan 😜",
"Pilih AYO aja "
];

no.style.position="fixed";

function kabur(){

const x=Math.random()*(window.innerWidth-150);
const y=Math.random()*(window.innerHeight-80);

no.style.left=x+"px";
no.style.top=y+"px";

besar+=4;

yes.style.fontSize=besar+"px";
yes.style.transform=`scale(${1+(besar-18)/40})`;

teks.innerHTML=kata[Math.floor(Math.random()*kata.length)];

}

no.addEventListener("mouseover",kabur);
no.addEventListener("touchstart",function(e){
e.preventDefault();
kabur();
});

yes.onclick=function(){

document.body.innerHTML=`
<div style="
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
height:100vh;
background:linear-gradient(135deg,#ff9ecb,#c8b6ff,#9bf6ff);
font-family:Arial;
text-align:center;
color:white;
">

<h1 style="font-size:60px;">🎉 YEAYYY!! 🎉</h1>

<h2>Makasih udah mau mabar </h2>

<p style="font-size:24px;">
Jam 12 siap yaa 🎮
</p>

</div>
`;

};

}

</script>

</body>
</html>
